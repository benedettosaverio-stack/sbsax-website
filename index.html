<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBSAX — DJ House / Tech House & Saxophone live</title>
<meta name="description" content="Saverio Benedetto, alias SBSAX. DJ house / tech house et saxophoniste live pour mariages, soirées privées, bars et événements d'entreprise dans les Hauts-de-France.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;
  --bg-raised:#141414;
  --surface:#161616;
  --surface-border:rgba(255,255,255,0.08);
  --text:#f5f0eb;
  --text-dim:rgba(245,240,235,0.62);
  --text-faint:rgba(245,240,235,0.36);
  --orange:#f07a29;
  --pink:#d31f53;
  --violet:#4b3c8b;
  --gradient:linear-gradient(100deg, var(--orange) 0%, var(--pink) 50%, var(--violet) 100%);
  --gradient-soft:linear-gradient(100deg, rgba(240,122,41,0.15) 0%, rgba(211,31,83,0.15) 50%, rgba(75,60,139,0.15) 100%);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; scroll-behavior:auto !important;}
}

.mono{font-family:'DM Mono',monospace;}

h1,h2,h3{
  font-family:'Anton',sans-serif;
  text-transform:uppercase;
  font-weight:400;
  line-height:1.12;
  letter-spacing:0.015em;
  overflow-wrap:break-word;
}

a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}

/* Focus visibility */
a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible{
  outline:2px solid var(--pink);
  outline-offset:3px;
}

.wrap{max-width:1180px; width:100%; margin:0 auto; padding:0 28px;}

/* ============ NAV ============ */
.nav{
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:22px 28px;
  background:linear-gradient(180deg, rgba(10,10,10,0.92) 0%, rgba(10,10,10,0) 100%);
  backdrop-filter:blur(6px);
}
.nav-logo{height:30px; display:block;}
.nav-links{display:flex; gap:34px; align-items:center;}
.nav-links a{
  font-size:13px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--text-dim); font-weight:600;
  position:relative; padding-bottom:4px;
}
.nav-links a::after{
  content:''; position:absolute; bottom:0; left:0; width:0; height:1.5px;
  background:var(--gradient); transition:width 0.3s ease;
}
.nav-links a:hover{color:var(--text);}
.nav-links a:hover::after{width:100%;}
.nav-cta{
  display:inline-flex; align-items:center; gap:8px;
  background:var(--gradient); color:#fff;
  padding:10px 20px; border-radius:30px;
  font-size:13px; font-weight:600; letter-spacing:0.03em;
}
.nav-mobile-toggle{display:none;}

@media (max-width: 760px){
  .nav-links{display:none;}
  .nav-mobile-toggle{display:block; background:none; border:none; color:var(--text); font-size:22px;}
}

/* ============ HERO ============ */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  padding-top:90px;
  overflow:hidden;
}
.hero-bg-symbol{
  position:absolute;
  right:-8%;
  top:50%;
  transform:translateY(-50%);
  width:62%;
  max-width:780px;
  opacity:0.16;
  filter:blur(0.3px);
  animation:breathe 7s ease-in-out infinite;
  pointer-events:none;
}
@keyframes breathe{
  0%,100%{opacity:0.13; transform:translateY(-50%) scale(1);}
  50%{opacity:0.22; transform:translateY(-50%) scale(1.035);}
}
.hero-grain{
  position:absolute; inset:0;
  background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 0);
  background-size:3px 3px;
  pointer-events:none;
}
.hero-content{position:relative; z-index:2; max-width:680px;}
.hero-eyebrow{
  display:flex; align-items:center; gap:10px;
  font-family:'DM Mono',monospace;
  font-size:13px; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-dim);
  margin-bottom:22px;
}
.hero-eyebrow .dot{width:7px; height:7px; border-radius:50%; background:var(--gradient); flex-shrink:0;}
.hero h1{
  font-size:clamp(48px, 8vw, 92px);
  margin-bottom:24px;
}
@media (max-width:480px){
  .hero-content{max-width:100%;}
  .hero h1{font-size:clamp(28px, 8.2vw, 42px);}
}
.hero h1 .line2{
  background:var(--gradient);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.hero-sub{
  font-size:18px; line-height:1.6; color:var(--text-dim);
  max-width:480px; margin-bottom:38px;
}
.hero-actions{display:flex; gap:16px; flex-wrap:wrap;}

.btn{
  display:inline-flex; align-items:center; gap:10px;
  padding:16px 30px; border-radius:30px;
  font-size:14px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;
  border:1.5px solid transparent;
  transition:transform 0.25s ease, box-shadow 0.25s ease;
}
.btn-primary{background:var(--gradient); color:#fff; box-shadow:0 8px 28px rgba(211,31,83,0.28);}
.btn-primary:hover{transform:translateY(-2px); box-shadow:0 12px 32px rgba(211,31,83,0.4);}
.btn-ghost{border-color:var(--surface-border); color:var(--text);}
.btn-ghost:hover{border-color:rgba(245,240,235,0.3); transform:translateY(-2px);}

.scroll-cue{
  position:absolute; bottom:36px; left:28px;
  display:flex; align-items:center; gap:10px;
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.1em;
  color:var(--text-faint); text-transform:uppercase;
}
.scroll-cue .line{width:1px; height:34px; background:linear-gradient(180deg, var(--text-faint), transparent); animation:scrolldown 2s ease-in-out infinite;}
@keyframes scrolldown{0%{opacity:0.3;} 50%{opacity:1;} 100%{opacity:0.3;}}

/* ============ SECTION SHARED ============ */
section{padding:120px 0;}
.section-eyebrow{
  font-family:'DM Mono',monospace; font-size:13px; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--pink); margin-bottom:16px; display:block;
}
.section-title{font-size:clamp(32px, 5vw, 56px); margin-bottom:22px; max-width:780px;}
.section-lede{font-size:17px; line-height:1.7; color:var(--text-dim); max-width:560px;}

/* ============ TWO WORLDS ============ */
.worlds{background:var(--bg-raised); position:relative;}
.worlds-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:1px;
  margin-top:64px;
  background:var(--surface-border);
  border:1px solid var(--surface-border);
}
.world-card{
  background:var(--bg-raised);
  padding:52px 44px;
  position:relative;
  overflow:hidden;
}
.world-card.dj{padding-right:50px;}
.world-card.sax{padding-left:50px;}
.world-tag{
  font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--text-faint); margin-bottom:18px; display:block;
}
.world-card h3{font-size:clamp(28px,4vw,40px); margin-bottom:20px;}
.world-card.dj h3{background:linear-gradient(100deg, var(--orange), var(--pink)); -webkit-background-clip:text; background-clip:text; color:transparent;}
.world-card.sax h3{background:linear-gradient(100deg, var(--pink), var(--violet)); -webkit-background-clip:text; background-clip:text; color:transparent;}
.world-card p{color:var(--text-dim); line-height:1.7; font-size:15.5px; margin-bottom:26px;}
.world-list{list-style:none; display:flex; flex-direction:column; gap:11px;}
.world-list li{
  display:flex; align-items:baseline; gap:10px;
  font-size:14.5px; color:var(--text-dim);
  font-family:'DM Mono',monospace;
}
.world-list li::before{content:'—'; color:var(--text-faint); flex-shrink:0;}

@media (max-width:760px){
  .worlds-grid{grid-template-columns:1fr;}
  .world-card.dj, .world-card.sax{padding:44px 28px;}
}

/* ============ SIGNATURE STRIPE ============ */
.stripe{
  height:3px;
  background:var(--gradient);
  background-size:200% 100%;
  animation:slide 8s linear infinite;
}
@keyframes slide{0%{background-position:0% 0;} 100%{background-position:200% 0;}}

/* ============ EVENTS ============ */
.events{padding:120px 0;}
.events-grid{
  display:grid; grid-template-columns:repeat(4,1fr); gap:1px;
  margin-top:56px; background:var(--surface-border); border:1px solid var(--surface-border);
}
.event-card{
  background:var(--bg); padding:36px 26px; text-align:left;
  transition:background 0.3s ease;
}
.event-card:hover{background:var(--surface);}
.event-num{font-family:'DM Mono',monospace; font-size:12px; color:var(--text-faint); margin-bottom:18px; display:block;}
.event-card h4{font-family:'Inter',sans-serif; font-weight:700; font-size:17px; text-transform:none; margin-bottom:10px; letter-spacing:0;}
.event-card p{font-size:14px; color:var(--text-dim); line-height:1.6;}

@media (max-width:900px){
  .events-grid{grid-template-columns:1fr 1fr;}
}
@media (max-width:560px){
  .events-grid{grid-template-columns:1fr;}
}

/* ============ GALLERY ============ */
.gallery{background:var(--bg-raised); padding:120px 0;}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(6, 1fr);
  grid-template-rows:repeat(3, 140px);
  gap:10px;
  margin-top:60px;
}
.g-item{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  background:var(--surface);
  border:1px solid var(--surface-border);
  display:flex; align-items:center; justify-content:center;
}
.g-item.large{grid-column:span 3; grid-row:span 2;}
.g-item.medium{grid-column:span 3; grid-row:span 1;}
.g-item.small{grid-column:span 2; grid-row:span 1;}
.g-placeholder{
  display:flex; flex-direction:column; align-items:center; gap:10px;
  color:var(--text-faint);
}
.g-placeholder svg{opacity:0.5;}
.g-placeholder span{font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;}
.g-item::before{
  content:'';
  position:absolute; inset:0;
  background:var(--gradient-soft);
  opacity:0;
  transition:opacity 0.4s ease;
}
.g-item:hover::before{opacity:1;}

@media (max-width:760px){
  .gallery-grid{grid-template-columns:repeat(2,1fr); grid-template-rows:none;}
  .g-item.large, .g-item.medium, .g-item.small{grid-column:span 1; grid-row:span 1; height:160px;}
}

.gallery-note{
  margin-top:30px;
  font-family:'DM Mono',monospace; font-size:13px; color:var(--text-faint);
  text-align:center;
}

/* ============ ABOUT / EQUIPMENT ============ */
.about{padding:120px 0;}
.about-grid{display:grid; grid-template-columns:1.1fr 0.9fr; gap:70px; align-items:start; margin-top:56px;}
.about-text p{font-size:16px; line-height:1.75; color:var(--text-dim); margin-bottom:18px;}
.about-text strong{color:var(--text); font-weight:600;}
.equip-list{
  background:var(--surface); border:1px solid var(--surface-border); border-radius:18px;
  padding:34px;
}
.equip-list h4{
  font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-faint); margin-bottom:22px;
}
.equip-row{
  display:flex; justify-content:space-between; gap:16px;
  padding:13px 0; border-bottom:1px solid var(--surface-border);
  font-size:14.5px;
}
.equip-row:last-child{border-bottom:none;}
.equip-row .k{color:var(--text);}
.equip-row .v{color:var(--text-faint); font-family:'DM Mono',monospace; font-size:13px; text-align:right;}

@media (max-width:860px){
  .about-grid{grid-template-columns:1fr; gap:40px;}
}

/* ============ CONTACT ============ */
.contact{
  background:var(--bg-raised);
  padding:130px 0 100px;
  position:relative;
  overflow:hidden;
}
.contact-grid{display:grid; grid-template-columns:1fr 1fr; gap:70px; align-items:start;}
.contact-info p{font-size:16px; color:var(--text-dim); line-height:1.7; margin-bottom:32px; max-width:420px;}
.contact-detail{display:flex; flex-direction:column; gap:18px; margin-bottom:36px;}
.contact-detail-row{display:flex; align-items:center; gap:14px;}
.contact-detail-row svg{flex-shrink:0; color:var(--pink);}
.contact-detail-row a, .contact-detail-row span{font-size:15px; color:var(--text);}
.contact-socials{display:flex; gap:14px;}
.social-btn{
  width:44px; height:44px; border-radius:50%;
  border:1px solid var(--surface-border);
  display:flex; align-items:center; justify-content:center;
  transition:border-color 0.25s ease, transform 0.25s ease;
}
.social-btn:hover{border-color:var(--pink); transform:translateY(-2px);}

.form-field{margin-bottom:20px;}
.form-field label{
  display:block; font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--text-faint); margin-bottom:9px;
}
.form-field input, .form-field select, .form-field textarea{
  width:100%; background:var(--surface); border:1px solid var(--surface-border);
  border-radius:10px; padding:14px 16px; color:var(--text); font-family:'Inter',sans-serif; font-size:15px;
  transition:border-color 0.2s ease;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus{
  outline:none; border-color:var(--pink);
}
.form-field textarea{resize:vertical; min-height:110px;}
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}

@media (max-width:860px){
  .contact-grid{grid-template-columns:1fr; gap:48px;}
  .form-row{grid-template-columns:1fr;}
}

/* ============ FOOTER ============ */
footer{
  padding:36px 0;
  border-top:1px solid var(--surface-border);
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:14px;
}
footer .f-logo{height:20px;}
footer .f-meta{font-family:'DM Mono',monospace; font-size:12px; color:var(--text-faint);}

/* ============ SCROLL REVEAL ============ */
.reveal{opacity:0; transform:translateY(24px); transition:opacity 0.7s ease, transform 0.7s ease;}
.reveal.in{opacity:1; transform:translateY(0);}
</style>
</head>
